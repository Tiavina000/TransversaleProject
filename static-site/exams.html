<!DOCTYPE html>
<html lang="fr" data-theme="green">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examens — ENENI</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="exams">
  <div id="app-navbar"></div>
  <main class="page-main">
    <div class="container page-content">
      <h1 style="font-size:1.5rem;font-weight:800;margin:0">Examens</h1>
      <p class="text-sec" style="margin-bottom:2rem">Préparez-vous et testez vos connaissances</p>
      <div class="grid grid-3 gap-4" id="exams-grid"></div>
    </div>
  </main>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!ENENI.requireAuth()) throw '';
    const statusColors = { DISPONIBLE: 'var(--color-primary)', PLANIFIE: 'var(--color-warning)', TERMINE: 'var(--text-muted)' };
    const statusLabels = { DISPONIBLE: 'Disponible', PLANIFIE: 'Planifié', TERMINE: 'Terminé' };

    document.getElementById('exams-grid').innerHTML = ENENI_DATA.exams.map(ex => `
      <div class="glass card-topline" style="padding:1.5rem;border-radius:1rem">
        <div class="flex justify-between items-start" style="margin-bottom:1rem">
          <span style="font-size:0.75rem;font-weight:700;padding:0.25rem 0.75rem;border-radius:999px;background:${statusColors[ex.statut]}20;color:${statusColors[ex.statut]}">${statusLabels[ex.statut]}</span>
          <span class="text-muted" style="font-size:0.75rem">${ex.type}</span>
        </div>
        <h3 style="font-weight:700;margin:0 0 0.5rem">${ex.titre}</h3>
        <p class="text-muted" style="font-size:0.875rem;margin:0 0 1rem">${ex.matiere}</p>
        <div class="flex gap-4 text-muted" style="font-size:0.75rem;margin-bottom:1rem">
          <span class="flex items-center gap-1"><i data-lucide="clock" style="width:14px"></i> ${ex.duree_minutes} min</span>
          <span class="flex items-center gap-1"><i data-lucide="help-circle" style="width:14px"></i> ${ex.nb_questions} Q</span>
        </div>
        ${ex.statut === 'DISPONIBLE'
          ? `<a href="exam.html?id=${ex.id}" class="btn-metal" style="width:100%;justify-content:center;font-size:0.875rem">Commencer</a>`
          : `<button class="btn-ghost" style="width:100%;justify-content:center;font-size:0.875rem;opacity:0.5;cursor:not-allowed" disabled>${ex.statut === 'TERMINE' ? 'Terminé' : 'Bientôt disponible'}</button>`
        }
      </div>
    `).join('');
    lucide.createIcons();
  </script>
</body>
</html>
