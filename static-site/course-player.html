<!DOCTYPE html>
<html lang="fr" data-theme="green">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecteur de cours — ENENI</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="courses">
  <div id="app-navbar"></div>
  <main class="page-main">
    <div class="container page-content">
      <a href="courses.html" class="text-primary" style="font-size:0.875rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.25rem;margin-bottom:1rem">
        <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Retour au catalogue
      </a>
      <div id="player-content"></div>
    </div>
  </main>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!ENENI.requireAuth()) throw '';
    const id = +new URLSearchParams(location.search).get('id') || 1;
    const course = ENENI_DATA.courseDetails[id] || ENENI_DATA.courseDetails[1];
    let activeChapter = 0;
    let activeLesson = 0;
    let studySeconds = 0;
    let timerRunning = true;

    const container = document.getElementById('player-content');
    function render() {
      const ch = course.chapitres[activeChapter];
      const lesson = ch?.lecons[activeLesson];
      container.innerHTML = `
        <div class="flex gap-6 flex-wrap">
          <div style="flex:1;min-width:280px">
            <div class="flex justify-between items-center flex-wrap gap-3" style="margin-bottom:1rem">
              <div>
                <h1 style="font-size:1.5rem;font-weight:800;margin:0">${course.titre}</h1>
                <p class="text-muted" style="font-size:0.875rem;margin:0">${course.matiere}</p>
              </div>
              <div class="glass-sm flex items-center gap-2" style="padding:0.5rem 1rem;border-radius:999px">
                <i data-lucide="clock" style="width:16px;height:16px;color:var(--color-primary)"></i>
                <span id="study-timer" style="font-weight:700;font-size:0.875rem">00:00:00</span>
              </div>
            </div>
            <div class="glass" style="padding:1.5rem;border-radius:1rem;min-height:300px;margin-bottom:1rem">
              <h2 style="font-size:1.125rem;font-weight:700;margin:0 0 1rem">${lesson?.titre || 'Sélectionnez une leçon'}</h2>
              <div id="lesson-content" class="text-sec" style="line-height:1.7">${lesson?.contenu || '<p>Choisissez un chapitre pour commencer</p>'}</div>
              <p class="text-muted" style="font-size:0.75rem;margin-top:1rem;border-top:1px solid var(--border-glass);padding-top:0.75rem">
                <i data-lucide="shield" style="width:12px;height:12px;display:inline"></i> Lecture seule — Copie interdite
              </p>
            </div>
            <div class="glass" style="padding:1rem;border-radius:1rem" id="validation-section">
              <h3 style="font-weight:700;font-size:0.875rem;margin:0 0 0.75rem">Exercice de validation</h3>
              <p style="font-size:0.875rem;margin:0 0 0.75rem">${course.validation?.question || ''}</p>
              <div id="qcm-options" class="flex flex-col gap-2"></div>
              <button class="btn-metal" style="margin-top:1rem" id="validate-btn">Terminer et Valider</button>
            </div>
          </div>
          <aside style="width:100%;max-width:280px;flex-shrink:0">
            <div class="glass" style="padding:1rem;border-radius:1rem;margin-bottom:1rem">
              <h3 style="font-weight:700;font-size:0.875rem;margin:0 0 0.75rem">Chapitres</h3>
              <div id="chapter-list"></div>
            </div>
            <div class="glass" style="padding:1rem;border-radius:1rem">
              <h3 style="font-weight:700;font-size:0.875rem;margin:0 0 0.75rem">Fichiers téléchargeables</h3>
              ${(course.fichiers || []).map(f => `
                <button class="glass-sm flex items-center gap-2" style="width:100%;padding:0.75rem;border-radius:0.5rem;margin-bottom:0.5rem;border:none;cursor:pointer;background:var(--overlay-light);text-align:left" onclick="ENENI.showToast('Téléchargement simulé : ${f.nom}')">
                  <i data-lucide="file-text" style="width:16px;color:var(--color-primary)"></i>
                  <span style="font-size:0.875rem">${f.nom}</span>
                </button>
              `).join('') || '<p class="text-muted" style="font-size:0.75rem">Aucun fichier</p>'}
            </div>
            <div class="glass" style="padding:1rem;border-radius:1rem;margin-top:1rem">
              <h3 style="font-weight:700;font-size:0.875rem;margin:0 0 0.5rem">Mes Notes</h3>
              <textarea class="form-input" rows="4" placeholder="Prenez vos notes ici..." style="font-size:0.875rem"></textarea>
              <button class="btn-ghost" style="width:100%;justify-content:center;margin-top:0.5rem;font-size:0.75rem" onclick="ENENI.showToast('Notes enregistrées')">Enregistrer</button>
            </div>
          </aside>
        </div>
      `;

      document.getElementById('chapter-list').innerHTML = course.chapitres.map((c, ci) => `
        <div style="margin-bottom:0.375rem">
          <button onclick="setChapter(${ci})" style="display:flex;align-items:center;gap:0.5rem;width:100%;padding:0.625rem 0.75rem;border:none;border-radius:0.75rem;cursor:pointer;text-align:left;font-size:0.8125rem;font-weight:${ci===activeChapter?'700':'600'};background:${ci===activeChapter?'var(--color-primary)':'var(--overlay-light)'};color:${ci===activeChapter?'white':'var(--text-primary)'};transition:all 0.2s">
            <i data-lucide="${ci===activeChapter?'chevron-down':'chevron-right'}" style="width:16px;height:16px;flex-shrink:0"></i>
            <span style="flex:1">${c.titre}</span>
            <span style="font-size:0.65rem;opacity:0.7;background:${ci===activeChapter?'rgba(255,255,255,0.2)':'var(--overlay-medium)'};padding:0.125rem 0.5rem;border-radius:999px">${c.lecons.length}</span>
          </button>
          <div style="margin-top:0.25rem;margin-left:0.5rem;border-left:2px solid ${ci===activeChapter?'var(--color-primary)':'var(--border-glass)'};padding-left:0.75rem">
            ${c.lecons.map((l, li) => `
              <button onclick="setLesson(${li})" style="display:flex;align-items:center;gap:0.5rem;width:100%;padding:0.5rem 0.625rem;margin-bottom:0.125rem;border:none;border-radius:0.5rem;cursor:pointer;text-align:left;font-size:0.75rem;background:${li===activeLesson?'var(--overlay-medium)':'transparent'};color:${li===activeLesson?'var(--text-primary)':'var(--text-secondary)'};transition:all 0.15s">
                <i data-lucide="${li===activeLesson?'play-circle':'circle'}" style="width:12px;height:12px;flex-shrink:0;color:${li===activeLesson?'var(--color-primary)':'var(--text-muted)'}"></i>
                <span style="flex:1;line-height:1.3">${l.titre}</span>
                ${l.duree_estimee ? `<span style="font-size:0.625rem;color:var(--text-muted);white-space:nowrap">${l.duree_estimee}min</span>` : ''}
              </button>
            `).join('')}
          </div>
        </div>
      `).join('');

      const v = course.validation;
      if (v?.options) {
        document.getElementById('qcm-options').innerHTML = v.options.map((o, i) => `
          <label class="glass-sm flex items-center gap-2" style="padding:0.75rem;border-radius:0.5rem;cursor:pointer">
            <input type="radio" name="validation" value="${i}"> <span style="font-size:0.875rem">${o}</span>
          </label>
        `).join('');
      }
      document.getElementById('validate-btn').onclick = () => {
        const sel = document.querySelector('input[name=validation]:checked');
        if (!sel) { ENENI.showToast('Sélectionnez une réponse'); return; }
        if (+sel.value === v.correct) ENENI.showToast('Chapitre validé ! Félicitations.');
        else ENENI.showToast('Score insuffisant. Révisez le cours.');
      };
      lucide.createIcons();
    }
    window.setChapter = ci => { activeChapter = ci; activeLesson = 0; render(); };
    window.setLesson = li => { activeLesson = li; render(); };
    render();

    setInterval(() => {
      if (!timerRunning) return;
      studySeconds++;
      const h = String(Math.floor(studySeconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((studySeconds % 3600) / 60)).padStart(2, '0');
      const s = String(studySeconds % 60).padStart(2, '0');
      const el = document.getElementById('study-timer');
      if (el) el.textContent = `${h}:${m}:${s}`;
    }, 1000);

    document.addEventListener('copy', e => { e.preventDefault(); ENENI.showToast('Copie interdite'); });
    lucide.createIcons();
  </script>
</body>
</html>
