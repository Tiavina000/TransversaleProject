<!DOCTYPE html>
<html lang="fr" data-theme="green">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulletin — ENENI</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="bulletin">
  <div id="app-navbar"></div>
  <main class="page-main">
    <div class="container page-content">
      <div class="flex justify-between items-start flex-wrap gap-4" style="margin-bottom:2rem">
        <div>
          <h1 style="font-size:1.5rem;font-weight:800;margin:0">Mon Bulletin</h1>
          <p class="text-sec">Consultez vos notes et suivez votre progression</p>
        </div>
        <div id="average-box" style="text-align:right"></div>
      </div>
      <div class="glass" style="border-radius:1rem;overflow:hidden" id="grades-table"></div>
    </div>
  </main>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!ENENI.requireAuth()) throw '';
    const user = ENENI.getUser();
    if (user.type_utilisateur !== 'ETUDIANT') {
      window.location.href = 'dashboard.html';
      throw '';
    }
    const notes = ENENI_DATA.notes;
    const moyenne = (notes.reduce((s, n) => s + n.note * n.coefficient, 0) / notes.reduce((s, n) => s + n.coefficient, 0)).toFixed(2);

    document.getElementById('average-box').innerHTML = `
      <p style="font-size:2rem;font-weight:900;margin:0;color:var(--color-primary)">${moyenne}</p>
      <p class="text-muted" style="font-size:0.75rem;margin:0">Moyenne générale /20</p>
    `;

    const appreciationColor = a => {
      if (a === 'Excellent') return 'var(--color-primary)';
      if (a === 'Très bien') return '#2EA87A';
      if (a === 'Bien') return 'var(--color-warning)';
      return 'var(--text-muted)';
    };

    document.getElementById('grades-table').innerHTML = `
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:var(--overlay-light)">
            <th style="padding:1rem;text-align:left;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted)">Matière</th>
            <th style="padding:1rem;text-align:center;font-size:0.75rem;text-transform:uppercase;color:var(--text-muted)">Note</th>
            <th style="padding:1rem;text-align:center;font-size:0.75rem;text-transform:uppercase;color:var(--text-muted)">Coef.</th>
            <th style="padding:1rem;text-align:right;font-size:0.75rem;text-transform:uppercase;color:var(--text-muted)">Appréciation</th>
          </tr>
        </thead>
        <tbody>
          ${notes.map(n => `
            <tr style="border-top:1px solid var(--border-glass)">
              <td style="padding:1rem;font-weight:600">${n.matiere}</td>
              <td style="padding:1rem;text-align:center">
                <span style="font-size:1.25rem;font-weight:900;color:var(--color-primary)">${n.note}</span>
                <span class="text-muted" style="font-size:0.75rem">/20</span>
              </td>
              <td style="padding:1rem;text-align:center;color:var(--text-secondary)">${n.coefficient}</td>
              <td style="padding:1rem;text-align:right;font-weight:600;color:${appreciationColor(n.appreciation)}">${n.appreciation}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    lucide.createIcons();
  </script>
</body>
</html>
