<!DOCTYPE html>
<html lang="fr" data-theme="green">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutique — ENENI</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="shop">
  <div id="app-navbar"></div>
  <main class="page-main">
    <div class="container page-content">
      <div class="flex justify-between items-start flex-wrap gap-4" style="margin-bottom:2rem">
        <div>
          <h1 style="font-size:1.5rem;font-weight:800;margin:0;display:flex;align-items:center;gap:0.75rem">
            <i data-lucide="shopping-bag" style="color:var(--color-primary)"></i> Boutique
          </h1>
          <p class="text-sec" style="margin-top:0.25rem">Ressources pédagogiques numériques</p>
        </div>
        <div class="flex gap-3 items-center" style="width:100%;max-width:20rem">
          <div style="position:relative;flex:1">
            <i data-lucide="search" style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);width:16px;color:var(--text-muted)"></i>
            <input class="form-input" id="shop-search" placeholder="Rechercher..." style="padding-left:2.25rem;font-size:0.875rem">
          </div>
          <button class="icon-btn glass-sm" id="open-cart" style="position:relative;padding:0.625rem">
            <i data-lucide="shopping-cart"></i>
            <span class="badge-count hidden" id="cart-badge">0</span>
          </button>
        </div>
      </div>
      <div class="grid grid-3 gap-4" id="products-grid"></div>
    </div>
  </main>

  <div class="cart-overlay" id="cart-overlay">
    <div class="cart-drawer" id="cart-drawer">
      <div style="padding:1.25rem;border-bottom:1px solid var(--border-glass);display:flex;justify-content:space-between;align-items:center">
        <h3 style="font-weight:700;margin:0">Mon Panier</h3>
        <button id="close-cart" style="background:none;border:none;cursor:pointer;color:var(--text-primary)"><i data-lucide="x"></i></button>
      </div>
      <div id="cart-items" style="flex:1;overflow-y:auto;padding:1rem"></div>
      <div style="padding:1.25rem;border-top:1px solid var(--border-glass)">
        <div class="flex justify-between" style="margin-bottom:1rem">
          <span style="font-weight:600">Total</span>
          <span id="cart-total" style="font-weight:900;color:var(--color-primary)">0 Ar</span>
        </div>
        <button class="btn-metal" id="checkout-btn" style="width:100%;justify-content:center">Commander (MVola / Orange)</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!ENENI.requireAuth()) throw '';
    let search = '';

    function updateCartUI() {
      const cart = ENENI.getCart();
      const total = cart.reduce((s, i) => s + i.prix * i.qty, 0);
      const count = cart.reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById('cart-badge');
      badge.textContent = count;
      badge.classList.toggle('hidden', count === 0);
      document.getElementById('cart-total').textContent = ENENI.formatMGA(total);
      document.getElementById('cart-items').innerHTML = cart.length ? cart.map(item => `
        <div class="flex justify-between items-center glass-sm" style="padding:0.75rem;border-radius:0.75rem;margin-bottom:0.5rem">
          <div>
            <p style="font-weight:600;margin:0;font-size:0.875rem">${item.titre}</p>
            <p class="text-muted" style="font-size:0.75rem;margin:0">×${item.qty} · ${ENENI.formatMGA(item.prix * item.qty)}</p>
          </div>
          <button onclick="removeFromCart(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--color-danger)">
            <i data-lucide="trash-2" style="width:16px"></i>
          </button>
        </div>
      `).join('') : '<p class="text-muted" style="text-align:center;padding:2rem">Panier vide</p>';
      lucide.createIcons();
    }

    window.removeFromCart = id => {
      ENENI.saveCart(ENENI.getCart().filter(p => p.id !== id));
      updateCartUI();
    };

    function renderProducts() {
      const filtered = ENENI_DATA.shop.filter(p => p.titre.toLowerCase().includes(search.toLowerCase()));
      document.getElementById('products-grid').innerHTML = filtered.map(p => `
        <div class="glass" style="padding:1.25rem;border-radius:1rem;display:flex;flex-direction:column">
          <div style="font-size:2.5rem;margin-bottom:0.75rem">${p.emoji}</div>
          <span style="font-size:0.625rem;font-weight:700;text-transform:uppercase;color:var(--color-primary);letter-spacing:0.05em">${p.type}</span>
          <h3 style="font-weight:700;margin:0.5rem 0">${p.titre}</h3>
          <p class="text-sec" style="font-size:0.875rem;flex:1;line-height:1.5">${p.description}</p>
          <div class="flex justify-between items-center" style="margin-top:1rem">
            <span style="font-weight:900;color:var(--color-primary)">${ENENI.formatMGA(p.prix)}</span>
            <button class="btn-metal" style="padding:0.5rem 0.75rem;font-size:0.75rem" data-product-id="${p.id}">
              <i data-lucide="plus" style="width:14px"></i> Ajouter
            </button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    document.getElementById('products-grid').addEventListener('click', e => {
      const btn = e.target.closest('[data-product-id]');
      if (!btn) return;
      const p = ENENI_DATA.shop.find(x => x.id === +btn.dataset.productId);
      if (p) { ENENI.addToCart(p); updateCartUI(); }
    });

    document.getElementById('shop-search').addEventListener('input', e => { search = e.target.value; renderProducts(); });
    document.getElementById('open-cart').onclick = () => {
      document.getElementById('cart-overlay').classList.add('open');
      document.getElementById('cart-drawer').classList.add('open');
      updateCartUI();
    };
    document.getElementById('close-cart').onclick = closeCart;
    document.getElementById('cart-overlay').onclick = e => { if (e.target === e.currentTarget) closeCart(); };
    function closeCart() {
      document.getElementById('cart-overlay').classList.remove('open');
      document.getElementById('cart-drawer').classList.remove('open');
    }
    document.getElementById('checkout-btn').onclick = () => {
      ENENI.saveCart([]);
      updateCartUI();
      closeCart();
      ENENI.showToast('Commande confirmée ! Paiement MVola/Orange Money à venir.');
    };

    renderProducts();
    updateCartUI();
    lucide.createIcons();
  </script>
</body>
</html>
