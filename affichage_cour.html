<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Moderne - Étude Interactive</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    padding:15px 25px;
    background:#1e293b;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    font-size:18px;
}

.profile{
    display:flex;
    align-items:center;
    gap:10px;
}

.profile img{
    width:40px;
    height:40px;
    border-radius:50%;
}

/* DASHBOARD */
.container{
    padding:20px;
}

/* GRID COUR */
.courses{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:20px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:15px;
}

.card h3{
    margin-top:10px;
}

.btn{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#ef4444;
    color:white;
    cursor:pointer;
}

/* MODE ETUDE */
.study{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    flex-direction:column;
    z-index:999;
}

/* BAR HAUT */
.studyTop{
    background:#111827;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.studyTop button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.modeSelect button{
    margin-right:10px;
    padding:8px 10px;
    border-radius:8px;
    border:none;
    cursor:pointer;
}

/* CONTENU ETUDE */
.studyContent{
    flex:1;
    display:flex;
    gap:10px;
    padding:10px;
}

/* VIDEO */
.video{
    flex:1;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

/* DOC */
.docs{
    flex:1;
    background:#fff;
    color:#000;
    padding:15px;
    border-radius:10px;
    overflow:auto;
}

/* NOTES */
.notes{
    width:250px;
    background:#1e293b;
    padding:10px;
    border-radius:10px;
}

textarea{
    width:100%;
    height:100%;
    background:#0f172a;
    color:white;
    border:none;
    outline:none;
    padding:10px;
    resize:none;
}

/* FULL VIDEO ONLY */
.fullVideo{
    flex:1;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:25px;
}

/* TIMER */
.timer{
    color:#22c55e;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
    <h1>📚 LMS Éducation Madagascar</h1>

    <div class="profile">
        <span id="timer">00:00</span>
        <img src="https://randomuser.me/api/portraits/men/32.jpg">
    </div>
</div>

<div class="container">

<h2>Mes Cours</h2><br>

<div class="courses">

<div class="card">
    <img src="https://images.unsplash.com/photo-1509228468518-180dd4864904">
    <h3>Mathématiques</h3>
    <p>Prof : Rakoto Jean</p>
    <button class="btn" onclick="openStudy('Mathématiques')">Commencer à étudier</button>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1581091870622-2c5e8c4b5c8d">
    <h3>Physique</h3>
    <p>Prof : Rabe</p>
    <button class="btn" onclick="openStudy('Physique')">Commencer à étudier</button>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1453733190371-0a9bedd82893">
    <h3>Informatique</h3>
    <p>Prof : Andry</p>
    <button class="btn" onclick="openStudy('Informatique')">Commencer à étudier</button>
</div>

</div>

</div>

<!-- MODE ETUDE -->
<div class="study" id="study">

<div class="studyTop">

<div>
<strong id="courseTitle">Cours</strong>
</div>

<div class="modeSelect">
<button onclick="setMode('docs')">📄 Fichiers</button>
<button onclick="setMode('split')">🎥 + 📄</button>
<button onclick="setMode('video')">🎥 Vidéo</button>
</div>

<button onclick="closeStudy()">Quitter</button>

</div>

<div class="studyContent">

<div class="video" id="video">
🎥 Vidéo du cours
</div>

<div class="docs" id="docs">
<h3>Contenu du cours</h3>
<p>
Ici les fichiers PDF, exercices, cours écrit...
</p>
</div>

<div class="notes">
<h3>📝 Notes</h3>
<textarea placeholder="Prends tes notes ici..."></textarea>
</div>

</div>

</div>

<script>

let sec = 0;
let timer;

function openStudy(course){

    document.getElementById("study").style.display = "flex";
    document.getElementById("courseTitle").innerText = course;

    document.documentElement.requestFullscreen?.();

    timer = setInterval(()=>{

        sec++;

        let m = Math.floor(sec/60);
        let s = sec%60;

        document.getElementById("timer").innerText =
        String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');

    },1000);

    setMode("split");
}

function closeStudy(){

    document.getElementById("study").style.display = "none";

    clearInterval(timer);

    document.exitFullscreen?.();

}

function setMode(mode){

    let video = document.getElementById("video");
    let docs = document.getElementById("docs");

    if(mode === "docs"){
        video.style.display = "none";
        docs.style.display = "block";
    }

    if(mode === "video"){
        video.style.display = "flex";
        docs.style.display = "none";
    }

    if(mode === "split"){
        video.style.display = "flex";
        docs.style.display = "block";
    }
}

document.addEventListener("visibilitychange",()=>{

    if(document.hidden){
        clearInterval(timer);
        alert("⚠ Mode étude suspendu (fenêtre quittée)");
    }

});

</script>

</body>
</html>
